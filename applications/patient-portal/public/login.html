<!DOCTYPE html>
<html>
<head>
    <title>Patient Login</title>
    <style>
        body { font-family: Arial; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 300px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        .error { color: red; text-align: center; margin: 10px 0; }
        .demo-accounts { background: #f8f9fa; padding: 15px; border-radius: 5px; margin: 20px 0; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>👤 Patient Login</h1>
        
        <form onsubmit="login(event)">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        
        <div id="error" class="error"></div>
        
        <div class="demo-accounts">
            <strong>Demo Accounts:</strong><br>
            Your Profile: admin / 123<br>
            John Doe: john / 456<br>
            John Doe (Alt): patient / patient123
        </div>
    </div>

    <script>
        async function login(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('patientToken', result.token);
                    localStorage.setItem('patientName', result.patient.name);
                    window.location.href = '/profile';
                } else {
                    document.getElementById('error').textContent = result.error;
                }
            } catch (error) {
                document.getElementById('error').textContent = 'Login failed';
            }
        }
    </script>
</body>
</html>
